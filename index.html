<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>記帳系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  padding: 15px;
  max-width: 600px;
  margin: auto;
}

h2, h3 {
  text-align: center;
}

input, select, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  font-size: 16px;
}

button {
  background-color: #4CAF50;
  color: white;
  border: none;
}

#rateBox {
  background: #f5f5f5;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 10px;
}

table {
  border-collapse: collapse;
  margin-top: 15px;
  width: 100%;
  font-size: 14px;
}

td, th {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}
</style>
</head>

<body>

<h2>💰 記帳系統</h2>

<div id="rateBox">📈 匯率載入中...</div>

<label>日期</label>
<input type="date" id="date">

<label>項目</label>
<input type="text" id="item" placeholder="例如：午餐">

<label>幣別</label>
<select id="currency">
  <option value="TWD">TWD</option>
  <option value="JPY">JPY</option>
</select>

<label>金額</label>
<input type="number" id="amount" placeholder="輸入金額">

<button onclick="submitData()">送出記帳</button>

<hr>

<h3>📊 消費紀錄</h3>

<label>開始日期</label>
<input type="date" id="start">

<label>結束日期</label>
<input type="date" id="end">

<button onclick="loadData()">查詢</button>

<table>
<thead>
<tr>
<th>日期</th>
<th>項目</th>
<th>原始金額</th>
<th>TWD</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyARg5ZDoUF4zQSX9nBVcytl4z8h83CP8hfrPHf70vusnLKCqcaNqagd-smTsiNL9ZP/exec"; // 🔥 改這裡

// ✅ 送出記帳
function submitData() {
  const data = {
    date: document.getElementById("date").value,
    item: document.getElementById("item").value,
    currency: document.getElementById("currency").value,
    amount: Number(document.getElementById("amount").value)
  };

  if (!data.date || !data.item || !data.amount) {
    alert("請填寫完整資料！");
    return;
  }

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    alert("✅ 記帳成功！");
    loadData();
  })
  .catch(() => {
    alert("❌ 發生錯誤");
  });
}

// ✅ 載入資料 + 匯率
function loadData() {
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  let url = GAS_URL + "?start=" + start + "&end=" + end;

  fetch(url)
    .then(res => res.json())
    .then(data => {

      // 📈 顯示前一天匯率
      document.getElementById("rateBox").innerHTML =
        `📈 匯率（${data.rateDate}）：1 JPY = ${data.rate.toFixed(3)} TWD`;

      let html = "";

      data.records.forEach(row => {
        html += `
          <tr>
            <td>${row.date}</td>
            <td>${row.item}</td>
            <td>${row.amount} ${row.currency}</td>
            <td>${row.twd}</td>
          </tr>
        `;
      });

      document.getElementById("tableBody").innerHTML = html;
    });
}

// ✅ 預設今天
window.onload = () => {
  let today = new Date().toISOString().split("T")[0];

  document.getElementById("date").value = today;
  document.getElementById("start").value = today;
  document.getElementById("end").value = today;

  loadData();
};
</script>

</body>
</html>
