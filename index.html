<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊記帳本（修復版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-sm space-y-6">
        <h1 class="text-2xl font-bold text-slate-800 border-b pb-4">🌍 旅遊記帳本</h1>

        <!-- 表單 -->
        <form id="form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">日期</label>
                <input type="date" id="date" required class="w-full border border-slate-300 p-2 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">項目名稱</label>
                <input type="text" id="item" placeholder="例如：拉麵、交通費" required class="w-full border border-slate-300 p-2 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">金額</label>
                <input type="number" id="amount" step="any" placeholder="請輸入數值" required class="w-full border border-slate-300 p-2 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">幣別</label>
                <select id="currency" class="w-full border border-slate-300 p-2 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="JPY">JPY (日幣)</option>
                    <option value="TWD">TWD (台幣)</option>
                </select>
            </div>
            <button id="submitBtn" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-lg transition duration-200">
                新增記錄
            </button>
        </form>

        <!-- 列表 -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100">
                        <th class="p-3 border-b font-semibold text-slate-700">時間</th>
                        <th class="p-3 border-b font-semibold text-slate-700">項目</th>
                        <th class="p-3 border-b font-semibold text-slate-700 text-right">原始金額</th>
                        <th class="p-3 border-b font-semibold text-slate-700 text-right">換算 TWD</th>
                        <th class="p-3 border-b font-semibold text-slate-700 text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y">
                    <!-- 資料渲染區 -->
                </tbody>
            </table>
        </div>
    </div>

<script>
    // 請確保此處為最新的 GAS 部署網址
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyARg5ZDoUF4zQSX9nBVcytl4z8h83CP8hfrPHf70vusnLKCqcaNqagd-smTsiNL9ZP/exec';

    let dataList = [];

    function formatDate(str) {
        const d = new Date(str);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function render() {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = dataList.length === 0 
            ? '<tr><td colspan="5" class="p-10 text-center text-slate-400">尚無資料，請先讀取或新增</td></tr>' 
            : '';

        dataList.forEach(row => {
            const tr = document.createElement('tr');
            tr.className = row.id.toString().startsWith('temp') ? 'bg-blue-50 animate-pulse' : '';
            tr.innerHTML = `
                <td class="p-3 text-sm text-slate-500">${formatDate(row.date)}</td>
                <td class="p-3 font-medium text-slate-700">${row.item}</td>
                <td class="p-3 text-right text-slate-600">${Number(row.amount).toLocaleString()} ${row.currency}</td>
                <td class="p-3 text-right font-bold text-blue-600">${Math.round(row.twd).toLocaleString()}</td>
                <td class="p-3 text-center">
                    <button onclick="del('${row.id}')" class="text-red-500 hover:text-red-700 font-medium">刪除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function load() {
        try {
            const res = await fetch(SCRIPT_URL);
            dataList = await res.json();
            render();
        } catch (e) {
            console.error("載入失敗", e);
        }
    }

    document.getElementById('form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.classList.add('loading');
        btn.innerText = '處理中...';

        const now = new Date();
        const dateInput = document.getElementById('date').value;
        const iso = new Date(`${dateInput}T${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`).toISOString();

        const payload = {
            action: 'ADD',
            date: iso,
            item: document.getElementById('item').value,
            amount: document.getElementById('amount').value,
            currency: document.getElementById('currency').value
        };

        // 樂觀更新 (立即顯示)
        const fake = {
            id: 'temp_' + Date.now(),
            date: iso,
            item: payload.item,
            amount: payload.amount,
            currency: payload.currency,
            twd: payload.currency === 'TWD' ? Number(payload.amount) : Number(payload.amount) * 0.22 // 預估匯率
        };
        dataList.unshift(fake);
        render();

        try {
            // 使用 POST 發送 JSON 字符串
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            // 提交後清除輸入框 (保留日期)
            document.getElementById('item').value = '';
            document.getElementById('amount').value = '';
            
            // 延遲一點點時間再重新加載最新正確數據（含正確匯率）
            setTimeout(load, 2000);
        } catch (err) {
            console.error("提交失敗", err);
        } finally {
            btn.classList.remove('loading');
            btn.innerText = '新增記錄';
        }
    };

    async function del(id) {
        if (!confirm('確定要刪除這筆資料嗎？')) return;
        dataList = dataList.filter(d => d.id !== id);
        render();

        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'DELETE', id: id })
        });
    }

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        load();
    };
</script>
</body>
</html>
