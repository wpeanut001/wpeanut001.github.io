<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人雲端記帳本 (極速版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white; 
            transition: transform 0.1s active; 
        }
        .btn-primary:active { transform: scale(0.96); }
        input, select { font-size: 16px !important; } /* 防止 iOS 自動放大 */
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80% { content: '...'; } }
        
        /* 列表載入動畫 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:max-w-xl mx-auto pb-20">

    <!-- 快速輸入區 -->
    <div class="card p-6 mb-6">
        <h1 class="text-xl font-bold mb-6 text-gray-800 flex items-center">
            <span class="mr-2">💰</span> 快速記帳
        </h1>
        
        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">消費日期</label>
                    <input type="date" id="date" class="mt-1 block w-full border-gray-200 rounded-lg bg-gray-50 p-3 border focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">幣別</label>
                    <select id="currency" class="mt-1 block w-full border-gray-200 rounded-lg bg-gray-50 p-3 border focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="JPY">JPY (日幣)</option>
                        <option value="TWD">TWD (台幣)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">消費項目</label>
                <input type="text" id="item" placeholder="去哪裡花了什麼？" class="mt-1 block w-full border-gray-200 rounded-lg bg-gray-50 p-3 border focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">金額</label>
                <input type="number" id="amount" inputmode="decimal" placeholder="0.00" class="mt-1 block w-full border-gray-200 rounded-lg bg-gray-50 p-3 border focus:ring-2 focus:ring-indigo-500 outline-none text-lg font-medium">
            </div>

            <button onclick="submitData()" id="submitBtn" class="w-full btn-primary py-4 rounded-xl font-bold text-lg shadow-lg">
                確認送出
            </button>
        </div>
    </div>

    <!-- 歷史紀錄標題與篩選 -->
    <div class="flex flex-wrap justify-between items-center mb-4 px-2 gap-2">
        <h2 class="font-bold text-gray-700">消費紀錄</h2>
        <div class="flex space-x-2 items-center">
            <input type="date" id="filterStart" onchange="applyFilter()" class="text-xs border rounded p-1 outline-none focus:ring-1 focus:ring-indigo-400">
            <span class="text-gray-400 text-xs">~</span>
            <input type="date" id="filterEnd" onchange="applyFilter()" class="text-xs border rounded p-1 outline-none focus:ring-1 focus:ring-indigo-400">
        </div>
    </div>

    <!-- 列表展示區 -->
    <div id="recordContainer" class="space-y-3">
        <div class="text-center text-gray-400 py-10">讀取資料中<span class="loading-dots"></span></div>
    </div>

    <script>
        // 重要：請務必替換為您部署後的 GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyARg5ZDoUF4zQSX9nBVcytl4z8h83CP8hfrPHf70vusnLKCqcaNqagd-smTsiNL9ZP/exec";
        
        // 本地資料快取
        let rawDataCache = [];

        // 初始化日期選擇器為今天
        const todayStr = new Date().toLocaleDateString('sv-SE'); 
        document.getElementById('date').value = todayStr;
        
        const now = new Date();
        document.getElementById('filterStart').valueAsDate = new Date(now.getFullYear(), now.getMonth(), 1);
        document.getElementById('filterEnd').valueAsDate = now;

        /**
         * 格式化本地日期時間為 ISO 格式 (保留時區資訊)
         */
        function getLocalISOString(date) {
            const tzOffset = -date.getTimezoneOffset();
            const diff = tzOffset >= 0 ? '+' : '-';
            const pad = n => `${Math.floor(Math.abs(n))}`.padStart(2, '0');
            return date.getFullYear() +
                '-' + pad(date.getMonth() + 1) +
                '-' + pad(date.getDate()) +
                'T' + pad(date.getHours()) +
                ':' + pad(date.getMinutes()) +
                ':' + pad(date.getSeconds()) +
                diff + pad(tzOffset / 60) +
                ':' + pad(tzOffset % 60);
        }

        /**
         * 送出資料到 GAS
         */
        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const item = document.getElementById('item').value.trim();
            const amount = document.getElementById('amount').value;
            const selectedDateStr = document.getElementById('date').value;
            const currency = document.getElementById('currency').value;

            if (!item || !amount) {
                alert("請填寫項目與金額");
                return;
            }

            // --- 修正時間邏輯：處理本地時區 ---
            let finalDate;
            const selectedDate = new Date(selectedDateStr);
            const today = new Date();
            
            const isToday = selectedDate.toDateString() === today.toDateString();
            
            if (isToday) {
                // 如果是今天，使用「現在」的確切時間
                finalDate = getLocalISOString(today);
            } else {
                // 如果是補登日期，設定為該日的 21:00
                selectedDate.setHours(21, 0, 0, 0);
                finalDate = getLocalISOString(selectedDate);
            }

            const originalBtnText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "儲存中...";

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'add',
                        date: finalDate, // 傳送包含本地時區偏移的字串
                        item: item,
                        currency: currency,
                        amount: amount
                    })
                });

                document.getElementById('item').value = '';
                document.getElementById('amount').value = '';
                
                await loadDataFromServer();
                
            } catch (error) {
                alert("連線失敗，請檢查網路");
            } finally {
                btn.disabled = false;
                btn.innerText = originalBtnText;
            }
        }

        async function loadDataFromServer() {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getData' })
                });
                rawDataCache = await response.json();
                applyFilter();
            } catch (e) {
                document.getElementById('recordContainer').innerHTML = 
                    '<div class="text-center text-red-400 py-10">資料讀取失敗</div>';
            }
        }

        function applyFilter() {
            const container = document.getElementById('recordContainer');
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;

            if (!rawDataCache || rawDataCache.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10">尚無紀錄</div>';
                return;
            }

            const filtered = rawDataCache.filter(row => {
                const rowDate = row['日期'].split(' ')[0];
                return rowDate >= start && rowDate <= end;
            }).sort((a,b) => new Date(b['日期']) - new Date(a['日期']));

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10">所選區間內無紀錄</div>';
                return;
            }

            renderList(filtered);
        }

        function renderList(items) {
            const container = document.getElementById('recordContainer');
            container.innerHTML = items.map(item => `
                <div class="card p-4 flex justify-between items-center animate-fade-in border-l-4 ${item['幣別'] === 'JPY' ? 'border-red-400' : 'border-emerald-400'}">
                    <div class="flex-1">
                        <div class="flex items-center space-x-2 text-[10px]">
                            <span class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded tracking-tighter">${item['日期']}</span>
                        </div>
                        <div class="mt-1 font-bold text-gray-800">${item['項目']}</div>
                        <div class="mt-0.5 flex items-baseline space-x-2">
                            <span class="text-lg font-semibold text-gray-900">${Number(item['金額']).toLocaleString()} <small class="text-xs uppercase font-normal">${item['幣別']}</small></span>
                            ${item['幣別'] === 'JPY' ? `<span class="text-xs text-gray-400">≈ NT$ ${Number(item['TWD']).toLocaleString()}</span>` : ''}
                        </div>
                    </div>
                    <button onclick="deleteRecord('${item['ID']}')" class="ml-4 p-2 text-gray-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        async function deleteRecord(id) {
            if (!confirm("確定要刪除這筆紀錄嗎？")) return;
            try {
                rawDataCache = rawDataCache.filter(item => item['ID'] !== id);
                applyFilter();
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'delete', id: id })
                });
                loadDataFromServer();
            } catch (e) {
                alert("刪除失敗");
                loadDataFromServer();
            }
        }

        window.onload = loadDataFromServer;
    </script>
</body>
</html>
