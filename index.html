<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊記帳與匯率轉換</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- 標題與匯率顯示 -->
        <header class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">旅遊記帳本</h1>
                <p class="text-slate-500 text-sm">自動同步至 Google 試算表</p>
            </div>
            <div id="exchange-rate-box" class="mt-4 md:mt-0 p-4 bg-blue-50 rounded-xl border border-blue-100 text-center md:text-right">
                <p class="text-xs text-blue-500 font-semibold uppercase tracking-wider">即時匯率更新</p>
                <p class="text-xl font-mono font-bold text-blue-700">1 TWD = <span id="jpy-rate">加載中...</span> JPY</p>
            </div>
        </header>

        <!-- 輸入表單 -->
        <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
            <h2 class="text-lg font-semibold mb-4 text-slate-700 flex items-center">
                <span class="mr-2">📝</span> 新增支出紀錄
            </h2>
            <form id="record-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">日期</label>
                    <input type="date" id="date" required class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">消費項目</label>
                    <input type="text" id="item" placeholder="例如：一蘭拉麵" required class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">金額與幣別</label>
                    <div class="flex">
                        <input type="number" id="amount" step="0.01" placeholder="金額" required class="w-full border border-slate-300 rounded-l-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition">
                        <select id="currency" class="border-y border-r border-slate-300 rounded-r-lg p-2 bg-slate-100 text-sm font-bold text-slate-700">
                            <option value="JPY">JPY</option>
                            <option value="TWD">TWD</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-end">
                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg active:transform active:scale-95 transition-all">
                        確認新增
                    </button>
                </div>
            </form>
            <div id="conversion-preview" class="mt-3 text-sm text-slate-500 flex items-center">
                <span class="bg-slate-200 px-2 py-0.5 rounded mr-2">換算台幣約</span>
                <span class="font-bold text-slate-700 font-mono text-base"><span id="preview-twd">0</span> TWD</span>
            </div>
        </section>

        <!-- 資料顯示 -->
        <section class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 class="text-lg font-semibold text-slate-700 flex items-center">
                    <span class="mr-2">📊</span> 歷史紀錄
                </h2>
                <button onclick="fetchData()" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full text-xs font-bold transition">
                    🔄 刷新資料
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4 border-b font-semibold">日期</th>
                            <th class="p-4 border-b font-semibold">項目</th>
                            <th class="p-4 border-b font-semibold text-right">原始金額</th>
                            <th class="p-4 border-b font-semibold text-right">台幣等值</th>
                        </tr>
                    </thead>
                    <tbody id="data-body" class="divide-y divide-slate-100">
                        <!-- 資料由 JS 動態生成 -->
                    </tbody>
                </table>
                <div id="loading" class="flex flex-col items-center justify-center p-12 hidden">
                    <div class="loading-spinner"></div>
                    <p class="mt-4 text-slate-400 text-sm">正在從 Google 試算表讀取資料...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- 重要設定：已填入您的 Google Apps Script 網址 ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxO7VIduFD_pV3xg5cAqMRGVgF-oqvykES0LNcbiQES9VeCBwv7K3ZdtJb2k2SlyLDo/exec'; 
        
        let currentRate = 0;

        // 1. 取得即時匯率 (TWD -> JPY)
        async function updateExchangeRate() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await response.json();
                currentRate = data.rates.JPY;
                document.getElementById('jpy-rate').innerText = currentRate.toFixed(4);
            } catch (error) {
                console.error('匯率更新失敗', error);
                document.getElementById('jpy-rate').innerText = '暫無連線';
                currentRate = 4.5; // 若失敗則使用預估值
            }
        }

        // 2. 即時換算預覽
        const amountInput = document.getElementById('amount');
        const currencySelect = document.getElementById('currency');
        const previewTwd = document.getElementById('preview-twd');

        function calculatePreview() {
            const amount = parseFloat(amountInput.value) || 0;
            const currency = currencySelect.value;
            let twdValue = 0;
            
            if (currency === 'JPY') {
                twdValue = currentRate > 0 ? amount / currentRate : 0;
            } else {
                twdValue = amount;
            }
            previewTwd.innerText = Math.round(twdValue).toLocaleString();
        }

        amountInput.addEventListener('input', calculatePreview);
        currencySelect.addEventListener('change', calculatePreview);

        // 3. 讀取 Google 試算表資料
        async function fetchData() {
            if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GAS_WEB_APP_URL')) {
                document.getElementById('data-body').innerHTML = '<tr><td colspan="4" class="text-center p-8 text-orange-500">網址設定不完全</td></tr>';
                return;
            }
            
            const loader = document.getElementById('loading');
            const tbody = document.getElementById('data-body');
            loader.classList.remove('hidden');
            tbody.innerHTML = '';

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    data.reverse().forEach(row => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-blue-50 transition-colors";
                        tr.innerHTML = `
                            <td class="p-4 text-sm text-slate-600">${new Date(row[0]).toLocaleDateString()}</td>
                            <td class="p-4 text-sm font-bold text-slate-800">${row[1]}</td>
                            <td class="p-4 text-sm text-right font-mono text-slate-600">${row[2]} <span class="text-xs text-slate-400">${row[3]}</span></td>
                            <td class="p-4 text-sm text-right font-bold font-mono text-blue-600">${row[4]} TWD</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center p-12 text-slate-400">目前沒有任何消費紀錄</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center p-12 text-red-500 font-medium">讀取失敗！請檢查 GAS 部署權限是否設為「任何人」</td></tr>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        // 4. 新增資料到 Google 試算表
        document.getElementById('record-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const twdAmount = (currency === 'JPY') ? Math.round(amount / currentRate) : amount;

            const payload = {
                date: document.getElementById('date').value,
                item: document.getElementById('item').value,
                amount: amount,
                currency: currency,
                twdAmount: twdAmount
            };

            btn.disabled = true;
            btn.innerHTML = '<span class="inline-block animate-spin mr-2">⏳</span> 儲存中...';

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                setTimeout(() => {
                    document.getElementById('record-form').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    calculatePreview();
                    fetchData();
                    btn.disabled = false;
                    btn.innerHTML = '確認新增';
                }, 1000);

            } catch (error) {
                alert('網路傳輸發生問題');
                btn.disabled = false;
                btn.innerHTML = '確認新增';
            }
        };

        window.onload = async () => {
            document.getElementById('date').valueAsDate = new Date();
            await updateExchangeRate();
            fetchData();
        };
    </script>
</body>
</html>
