<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊記帳本 - 日期篩選版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
        body.is-loading .loading-overlay { display: flex; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div id="loader" class="loading-overlay">
        <div class="text-blue-600 font-bold flex items-center">
            <svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            處理中...
        </div>
    </div>

    <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h1 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="mr-2">📝</span> 旅遊快速記帳
            </h1>

            <form id="payForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-500 mb-1">消費項目</label>
                    <input type="text" id="item" placeholder="例如：早餐、拉麵" required 
                        class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">幣別</label>
                        <select id="currency" class="w-full border-gray-200 border p-3 rounded-xl bg-white outline-none">
                            <option value="JPY">JPY (日幣)</option>
                            <option value="TWD">TWD (台幣)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">金額</label>
                        <input type="number" id="amount" placeholder="0" required 
                            class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition transform active:scale-95">
                    確認送出
                </button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="p-5 bg-gray-50 border-b space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-gray-700 text-lg">歷史記帳明細</h2>
                    <button onclick="fetchData()" class="text-sm text-blue-600 hover:underline font-medium">重置/刷新</button>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-7 gap-2 items-end bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <div class="sm:col-span-3">
                        <label class="block text-xs text-gray-400 mb-1">開始日期</label>
                        <input type="date" id="startDate" class="w-full text-sm border-gray-100 border p-2 rounded-lg bg-gray-50 outline-none focus:bg-white">
                    </div>
                    <div class="sm:col-span-3">
                        <label class="block text-xs text-gray-400 mb-1">結束日期</label>
                        <input type="date" id="endDate" class="w-full text-sm border-gray-100 border p-2 rounded-lg bg-gray-50 outline-none focus:bg-white">
                    </div>
                    <div class="sm:col-span-1">
                        <button onclick="filterByDate()" class="w-full bg-slate-700 text-white text-sm py-2 rounded-lg hover:bg-slate-800 transition">篩選</button>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-xs text-gray-400 uppercase bg-gray-50">
                        <tr>
                            <th class="px-4 py-3">項目</th>
                            <th class="px-4 py-3 text-right">金額</th>
                            <th class="px-4 py-3 text-right">台幣估計</th>
                            <th class="px-4 py-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="listBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. 請填入您的 GAS 部署網址
        const SCRIPT_URL = '你的_GAS_部署網址';

        const form = document.getElementById('payForm');
        const listBody = document.getElementById('listBody');
        let fullData = []; // 儲存從伺服器抓下來的所有資料

        function setQuerying(bool) {
            if (bool) document.body.classList.add('is-loading');
            else document.body.classList.remove('is-loading');
        }

        // 讀取資料
        async function fetchData() {
            setQuerying(true);
            try {
                const res = await fetch(SCRIPT_URL);
                fullData = await res.json();
                render(fullData);
                // 清空日期篩選器
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
            } catch (e) {
                listBody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-400">無法讀取資料</td></tr>';
            } finally {
                setQuerying(false);
            }
        }

        // 日期篩選邏輯
        function filterByDate() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            if (!start || !end) {
                alert("請同時選擇開始與結束日期");
                return;
            }

            // 將日期字串轉為時間戳記 (設定開始為 00:00:00，結束為 23:59:59)
            const startTime = new Date(start + 'T00:00:00').getTime();
            const endTime = new Date(end + 'T23:59:59').getTime();

            const filtered = fullData.filter(item => {
                const itemTime = new Date(item.date).getTime();
                return itemTime >= startTime && itemTime <= endTime;
            });

            render(filtered);
        }

        // 渲染表格
        function render(items) {
            if (!items || items.length === 0) {
                listBody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-400">找不到符合範圍的紀錄</td></tr>';
                return;
            }
            listBody.innerHTML = items.map(item => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-4 py-4">
                        <div class="font-medium text-gray-800">${item.item}</div>
                        <div class="text-xs text-gray-400">${formatDateDisplay(item.date)}</div>
                    </td>
                    <td class="px-4 py-4 text-right text-gray-600 font-mono">
                        ${item.amount} <span class="text-xs">${item.currency}</span>
                    </td>
                    <td class="px-4 py-4 text-right text-blue-600 font-bold">
                        ${Math.round(item.twd || 0)}
                    </td>
                    <td class="px-4 py-4 text-center">
                        <button onclick="deleteItem('${item.id}')" class="text-red-400 hover:text-red-600 p-1">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function formatDateDisplay(dateStr) {
            const d = new Date(dateStr);
            return isNaN(d) ? dateStr : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            setQuerying(true);
            const payload = {
                action: 'ADD',
                item: document.getElementById('item').value,
                amount: document.getElementById('amount').value,
                currency: document.getElementById('currency').value
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                form.reset();
                setTimeout(fetchData, 1500);
            } catch (err) {
                alert('發送失敗');
            } finally {
                setQuerying(false);
            }
        };

        async function deleteItem(id) {
            if (!confirm('確定刪除？')) return;
            setQuerying(true);
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
                setTimeout(fetchData, 1000);
            } finally {
                setQuerying(false);
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
