<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊記帳本</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-50 p-6">

<div class="max-w-3xl mx-auto space-y-6">

<h1 class="text-2xl font-bold">旅遊記帳本</h1>

<form id="record-form" class="grid grid-cols-2 gap-4">
<input type="date" id="date" required class="border p-2">
<input type="text" id="item" placeholder="項目" required class="border p-2">
<input type="number" id="amount" placeholder="金額" required class="border p-2">

<select id="currency" class="border p-2">
<option value="JPY">JPY</option>
<option value="TWD">TWD</option>
</select>

<button class="col-span-2 bg-blue-600 text-white p-2 rounded">新增</button>
</form>

<table class="w-full mt-6 border">
<thead>
<tr>
<th>日期</th>
<th>項目</th>
<th>金額</th>
<th>TWD</th>
</tr>
</thead>
<tbody id="data-body"></tbody>
</table>

</div>

<script>
const SCRIPT_URL = '你的GAS網址';

let rawData = [];

/* ✅ 顯示時間統一格式 */
function formatDisplayDate(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;

    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');

    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');

    return `${y}-${m}-${day} ${h}:${min}:${s}`;
}

/* 讀資料 */
async function fetchData() {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    rawData = data;

    renderTable();
}

/* 顯示 */
function renderTable() {
    const tbody = document.getElementById('data-body');
    tbody.innerHTML = '';

    rawData.forEach(row => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
        <td>${formatDisplayDate(row[0])}</td>
        <td>${row[1]}</td>
        <td>${row[2]} ${row[3]}</td>
        <td>${row[4]}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* ✅ 送出資料（ISO格式） */
document.getElementById('record-form').onsubmit = async (e) => {
    e.preventDefault();

    const date = document.getElementById('date').value;
    const now = new Date();

    const isoString = new Date(
        `${date}T${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`
    ).toISOString();

    const payload = {
        action: 'ADD',
        date: isoString,
        item: document.getElementById('item').value,
        amount: document.getElementById('amount').value,
        currency: document.getElementById('currency').value
    };

    await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
    });

    fetchData();
};

window.onload = () => {
    document.getElementById('date').valueAsDate = new Date();
    fetchData();
};
</script>

</body>
</html>
