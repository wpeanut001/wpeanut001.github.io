<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊記帳與匯率轉換</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 SheetJS 用於匯出 Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        .currency-btn.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .action-btn {
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        tr:hover .action-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- 標題與匯率顯示 -->
        <header class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">旅遊記帳本</h1>
                <p class="text-slate-500 text-sm">自動同步至 Google 試算表 (預設日圓)</p>
            </div>
            <div id="exchange-rate-box" class="mt-4 md:mt-0 p-4 bg-orange-50 rounded-xl border border-orange-100 text-center md:text-right">
                <p class="text-xs text-orange-500 font-semibold uppercase tracking-wider">即時匯率更新</p>
                <p class="text-xl font-mono font-bold text-orange-700">1 JPY = <span id="twd-rate">加載中...</span> TWD</p>
            </div>
        </header>

        <!-- 新增紀錄表單 -->
        <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
            <h2 class="text-lg font-semibold mb-4 text-slate-700 flex items-center">
                <span class="mr-2">📝</span> 新增支出紀錄
            </h2>
            <form id="record-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">日期</label>
                    <input type="date" id="date" required class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">消費項目</label>
                    <input type="text" id="item" placeholder="例如：一蘭拉麵" required class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">金額</label>
                    <input type="number" id="amount" step="0.01" placeholder="輸入金額" required class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">結帳幣別</label>
                    <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                        <!-- 預設啟動日圓按鈕樣式 -->
                        <button type="button" onclick="setCurrency('JPY')" id="btn-JPY" class="currency-btn active flex-1 py-1 text-sm font-bold rounded-md border border-transparent transition-all">JPY</button>
                        <button type="button" onclick="setCurrency('TWD')" id="btn-TWD" class="currency-btn flex-1 py-1 text-sm font-bold rounded-md border border-transparent transition-all text-slate-500">TWD</button>
                    </div>
                    <input type="hidden" id="currency" value="JPY">
                </div>
                <div class="md:col-span-4 flex items-center justify-between mt-2 pt-2 border-t border-slate-100">
                    <div id="conversion-preview" class="text-sm text-slate-500 flex items-center">
                        <span class="bg-slate-200 px-2 py-0.5 rounded mr-2">預計台幣支出</span>
                        <span class="font-bold text-slate-700 font-mono text-lg"><span id="preview-twd">0</span> TWD</span>
                    </div>
                    <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg shadow-lg active:transform active:scale-95 transition-all">
                        確認新增
                    </button>
                </div>
            </form>
        </section>

        <!-- 搜尋與篩選功能 -->
        <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
            <h2 class="text-lg font-semibold mb-4 text-slate-700 flex items-center">
                <span class="mr-2">🔍</span> 搜尋與導出
            </h2>
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-slate-600 mb-1">開始日期</label>
                    <input type="date" id="filter-start" class="w-full border border-slate-300 rounded-lg p-2 outline-none">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-slate-600 mb-1">結束日期</label>
                    <input type="date" id="filter-end" class="w-full border border-slate-300 rounded-lg p-2 outline-none">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="applyFilter()" class="flex-1 md:flex-none bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 px-6 rounded-lg transition">
                        搜尋
                    </button>
                    <button onclick="exportToExcel()" class="flex-1 md:flex-none bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition">
                        匯出 Excel
                    </button>
                </div>
            </div>
            <div id="filter-summary" class="mt-4 p-3 bg-slate-50 rounded-lg text-sm text-slate-600 hidden">
                <span id="summary-text">搜尋範圍內總支出：</span><span id="total-filtered-twd" class="font-bold text-blue-600 text-lg">0</span> TWD
            </div>
        </section>

        <!-- 歷史紀錄列表 -->
        <section class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 class="text-lg font-semibold text-slate-700 flex items-center">
                    <span class="mr-2">📊</span> 歷史紀錄 <span id="list-type-hint" class="ml-2 text-xs font-normal text-slate-400">(最近 20 筆)</span>
                </h2>
                <div class="flex gap-2">
                    <button onclick="clearFilter()" class="px-3 py-1 text-slate-400 hover:text-slate-600 text-xs font-bold transition">
                        清除篩選
                    </button>
                    <button onclick="fetchData()" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full text-xs font-bold transition">
                        🔄 刷新資料
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="records-table">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4 border-b font-semibold">日期時間</th>
                            <th class="p-4 border-b font-semibold">項目</th>
                            <th class="p-4 border-b font-semibold text-right">原始金額</th>
                            <th class="p-4 border-b font-semibold text-right">台幣等值</th>
                            <th class="p-4 border-b font-semibold text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="data-body" class="divide-y divide-slate-100">
                        <!-- 資料由 JS 動態生成 -->
                    </tbody>
                </table>
                <div id="loading" class="flex flex-col items-center justify-center p-12 hidden">
                    <div class="loading-spinner"></div>
                    <p class="mt-4 text-slate-400 text-sm">讀取中...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyARg5ZDoUF4zQSX9nBVcytl4z8h83CP8hfrPHf70vusnLKCqcaNqagd-smTsiNL9ZP/exec'; 
        
        let jpyToTwdRate = 0; 
        let rawData = []; 
        let filteredData = []; 

        async function updateExchangeRate() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await response.json();
                jpyToTwdRate = 1 / data.rates.JPY;
                document.getElementById('twd-rate').innerText = jpyToTwdRate.toFixed(4);
            } catch (error) {
                document.getElementById('twd-rate').innerText = '暫無連線';
                jpyToTwdRate = 0.22;
            }
        }

        function setCurrency(cur) {
            document.getElementById('currency').value = cur;
            document.querySelectorAll('.currency-btn').forEach(btn => {
                btn.classList.remove('active', 'text-white');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById('btn-' + cur);
            activeBtn.classList.add('active', 'text-white');
            activeBtn.classList.remove('text-slate-500');
            calculatePreview();
        }

        function calculatePreview() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const currency = document.getElementById('currency').value;
            let twdValue = (currency === 'JPY') ? (amount * jpyToTwdRate) : amount;
            document.getElementById('preview-twd').innerText = Math.round(twdValue).toLocaleString();
        }

        document.getElementById('amount').addEventListener('input', calculatePreview);

        async function fetchData() {
            if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GAS_WEB_APP_URL')) return;
            const loader = document.getElementById('loading');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                rawData = data.map((row, index) => ({
                    id: index,
                    dateString: row[0],
                    item: row[1],
                    amount: row[2],
                    currency: row[3],
                    twdAmount: row[4]
                }));
                applyFilter();
            } catch (error) {
                document.getElementById('data-body').innerHTML = '<tr><td colspan="5" class="text-center p-12 text-red-500">讀取失敗</td></tr>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        function formatDisplayDate(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            const ymd = d.toLocaleDateString();
            const hms = d.toTimeString().split(' ')[0]; 
            return `<div class="text-slate-800">${ymd}</div><div class="text-[10px] text-slate-400 font-mono">${hms}</div>`;
        }

        function renderTable(dataToRender) {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = '';
            
            if (dataToRender.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-12 text-slate-400">沒有符合條件的紀錄</td></tr>';
                return;
            }

            let totalTwd = 0;
            dataToRender.forEach(row => {
                totalTwd += Number(row.twdAmount);
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors border-b border-slate-50";
                tr.innerHTML = `
                    <td class="p-4 text-xs">${formatDisplayDate(row.dateString)}</td>
                    <td class="p-4 text-sm font-bold text-slate-800">${row.item}</td>
                    <td class="p-4 text-sm text-right font-mono text-slate-600">${row.amount} <span class="text-xs text-slate-400">${row.currency}</span></td>
                    <td class="p-4 text-sm text-right font-bold font-mono text-blue-600">${row.twdAmount} TWD</td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick='deleteRecord(${JSON.stringify(row)})' class="action-btn text-red-400 hover:text-red-600" title="刪除">🗑️</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('total-filtered-twd').innerText = Math.round(totalTwd).toLocaleString();
        }

        async function deleteRecord(row) {
            if (!confirm(`確定要刪除「${row.item}」這筆紀錄嗎？`)) return;
            const btn = event.currentTarget;
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify({
                        action: 'DELETE',
                        date: row.dateString,
                        item: row.item,
                        amount: row.amount
                    })
                });
                rawData = rawData.filter(r => !(r.dateString === row.dateString && r.item === row.item && r.amount === row.amount));
                applyFilter();
                setTimeout(fetchData, 1500);
            } catch (error) {
                alert('刪除失敗');
                btn.innerText = "🗑️";
                btn.disabled = false;
            }
        }

        function applyFilter() {
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const summary = document.getElementById('filter-summary');
            const summaryText = document.getElementById('summary-text');
            const hint = document.getElementById('list-type-hint');

            let sortedRaw = [...rawData].sort((a, b) => new Date(b.dateString) - new Date(a.dateString));

            if (!start && !end) {
                filteredData = sortedRaw.slice(0, 20);
                summary.classList.remove('hidden');
                summaryText.innerText = "最近 20 筆支出總計：";
                hint.innerText = "(最近 20 筆)";
            } else {
                filteredData = sortedRaw.filter(row => {
                    const rowDate = new Date(row.dateString).getTime();
                    const startTime = start ? new Date(start).getTime() : 0;
                    const endTime = end ? new Date(end).setHours(23,59,59,999) : Infinity;
                    return rowDate >= startTime && rowDate <= endTime;
                });
                summary.classList.remove('hidden');
                summaryText.innerText = "搜尋範圍內總支出：";
                hint.innerText = "(搜尋結果)";
            }
            renderTable(filteredData);
        }

        function clearFilter() {
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            applyFilter();
        }

        function exportToExcel() {
            if (filteredData.length === 0) {
                alert('目前沒有資料可供匯出');
                return;
            }
            let totalTwdSum = 0;
            const excelData = filteredData.map(row => {
                totalTwdSum += Number(row.twdAmount);
                const d = new Date(row.dateString);
                return {
                    '日期時間': d.toLocaleString(),
                    '消費項目': row.item,
                    '原始金額': row.amount,
                    '幣別': row.currency,
                    '台幣等值': row.twdAmount
                };
            });
            excelData.push({});
            excelData.push({ '日期時間': '總計', '消費項目': `共 ${filteredData.length} 筆資料`, '台幣等值': Math.round(totalTwdSum) });
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "消費紀錄");
            XLSX.writeFile(workbook, `旅遊記帳_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        document.getElementById('record-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const twdAmount = (currency === 'JPY') ? Math.round(amount * jpyToTwdRate) : amount;
            
            const inputDateStr = document.getElementById('date').value; 
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const fullDateTime = `${inputDateStr} ${hours}:${minutes}:${seconds}`;

            const payload = {
                action: 'ADD',
                date: fullDateTime,
                item: document.getElementById('item').value,
                amount: amount,
                currency: currency,
                twdAmount: twdAmount
            };

            btn.disabled = true;
            btn.innerHTML = '⏳';

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                setTimeout(() => {
                    document.getElementById('record-form').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    // 關鍵：重設後再次強制預設為 JPY
                    setCurrency('JPY'); 
                    calculatePreview();
                    fetchData();
                    btn.disabled = false;
                    btn.innerHTML = '確認新增';
                }, 1000);
            } catch (error) {
                alert('網路錯誤');
                btn.disabled = false;
                btn.innerHTML = '確認新增';
            }
        };

        window.onload = async () => {
            document.getElementById('date').valueAsDate = new Date();
            await updateExchangeRate();
            // 關鍵：頁面載入後預設選取 JPY
            setCurrency('JPY'); 
            fetchData();
        };
    </script>
</body>
</html>
