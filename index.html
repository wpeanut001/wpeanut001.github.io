<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊記帳本 - 極致流暢版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        body.is-loading .loading-overlay { display: flex; }
        
        .optimistic-item {
            opacity: 0.6;
            border-left: 4px solid #3b82f6;
            background-color: #f0f7ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.4; }
            100% { opacity: 0.6; }
        }

        .btn-active:active { transform: scale(0.96); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 刪除動畫 */
        .removing {
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div id="loader" class="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-bold text-slate-500">同步雲端資料...</p>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-4 pt-6 space-y-6">
        
        <!-- 表單卡片 -->
        <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">✍️ 快速記帳</h1>
                <div id="rateStatus" class="text-[10px] font-bold bg-slate-100 text-slate-400 px-3 py-1 rounded-full uppercase">匯率連線中...</div>
            </div>

            <form id="payForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 ml-1 uppercase">消費項目</label>
                    <input type="text" id="item" placeholder="例如：藥妝、拉麵..." required 
                        class="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition text-lg font-medium text-slate-700">
                </div>

                <div class="grid grid-cols-12 gap-3">
                    <!-- 日期選擇 -->
                    <div class="col-span-5 space-y-1">
                        <label class="text-xs font-bold text-slate-400 ml-1 uppercase">日期</label>
                        <input type="date" id="inputDate" required
                            class="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold text-slate-600">
                    </div>
                    <!-- 幣別 -->
                    <div class="col-span-3 space-y-1">
                        <label class="text-xs font-bold text-slate-400 ml-1 uppercase">幣別</label>
                        <div class="relative">
                            <select id="currency" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-600 appearance-none text-sm">
                                <option value="JPY">JPY</option>
                                <option value="TWD">TWD</option>
                            </select>
                            <div class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </div>
                        </div>
                    </div>
                    <!-- 金額 -->
                    <div class="col-span-4 space-y-1">
                        <label class="text-xs font-bold text-slate-400 ml-1 uppercase">金額</label>
                        <input type="number" id="amount" placeholder="0" step="any" inputmode="decimal" required 
                            class="w-full bg-slate-50 border-none p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-lg font-mono font-bold text-slate-700">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 transition btn-active text-lg mt-2">
                    確認儲存
                </button>
            </form>
        </div>

        <!-- 列表卡片 -->
        <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 overflow-hidden border border-white">
            <div class="p-6 border-b border-slate-50">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-black text-slate-700 text-lg">📊 消費紀錄</h2>
                    <button onclick="fetchData()" class="p-2 bg-slate-50 rounded-xl hover:bg-slate-100 transition btn-active">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>

                <!-- 列表日期篩選器 -->
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">開始日期</label>
                        <input type="date" id="startDate" onchange="render(fullData)" class="w-full bg-slate-50 p-2 rounded-xl text-xs font-bold text-slate-600 outline-none border-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">結束日期</label>
                        <input type="date" id="endDate" onchange="render(fullData)" class="w-full bg-slate-50 p-2 rounded-xl text-xs font-bold text-slate-600 outline-none border-none focus:ring-1 focus:ring-blue-400">
                    </div>
                </div>

                <!-- 統計資訊欄 -->
                <div class="bg-blue-50 rounded-2xl p-4 flex justify-between items-center border border-blue-100">
                    <div>
                        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-wider">範圍內總計</p>
                        <p class="text-xs text-blue-500 font-medium mt-0.5" id="totalCount">共 0 筆消費</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-blue-600 tracking-tight" id="totalAmount">NT$ 0</p>
                    </div>
                </div>
            </div>

            <div class="max-h-[60vh] overflow-y-auto no-scrollbar">
                <table class="w-full text-left border-collapse">
                    <tbody id="listBody" class="divide-y divide-slate-50">
                        <!-- 動態內容 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 請在此填入您的 Google Apps Script 部署 URL
        // ----------------------------------------------------
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyARg5ZDoUF4zQSX9nBVcytl4z8h83CP8hfrPHf70vusnLKCqcaNqagd-smTsiNL9ZP/exec'; 

        let fullData = JSON.parse(localStorage.getItem('travel_records_v3') || '[]');
        let jpyRate = parseFloat(localStorage.getItem('jpy_rate_v3') || '0.215');

        // 初始化所有日期欄位
        function initDateFilters() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            // 表單輸入日期預設今天
            document.getElementById('inputDate').value = todayStr;

            // 篩選日期預設當月
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            
            document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
            document.getElementById('endDate').value = lastDay.toISOString().split('T')[0];
        }

        // 初始化匯率
        async function initRate() {
            const ts = localStorage.getItem('jpy_rate_ts_v3');
            const now = Date.now();
            
            if (ts && (now - ts < 3600000)) {
                updateRateUI(true);
                return;
            }

            try {
                const res = await fetch("https://open.er-api.com/v6/latest/JPY");
                const data = await res.json();
                jpyRate = data.rates.TWD;
                localStorage.setItem('jpy_rate_v3', jpyRate);
                localStorage.setItem('jpy_rate_ts_v3', now);
                updateRateUI(true);
            } catch (e) { 
                updateRateUI(false); 
            }
        }

        function updateRateUI(ok) {
            const el = document.getElementById('rateStatus');
            if (el) {
                el.innerText = ok ? `JPY 匯率: ${jpyRate.toFixed(4)}` : "匯率讀取失敗";
                el.classList.remove('text-slate-400', 'text-orange-400', 'text-blue-500');
                el.classList.add(ok ? 'text-blue-500' : 'text-orange-400');
            }
        }

        // 提交表單
        document.getElementById('payForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!SCRIPT_URL) { 
                alert("⚠️ 請先在代碼中填寫 SCRIPT_URL (GAS 部署網址)"); 
                return; 
            }

            const item = document.getElementById('item').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const selectedDate = document.getElementById('inputDate').value;
            const twdEstimate = currency === 'JPY' ? Math.round(amount * jpyRate) : amount;
            
            const tempId = 'temp-' + Date.now();
            const optimisticItem = {
                id: tempId, 
                item, 
                amount, 
                currency, 
                twd: twdEstimate,
                // 如果選的是今天，保留具體時分秒，否則用選定日期的午夜時間
                date: (selectedDate === new Date().toISOString().split('T')[0]) ? new Date().toISOString() : new Date(selectedDate).toISOString(), 
                optimistic: true
            };

            fullData.unshift(optimisticItem);
            // 提交後按日期重新排序，確保顯示正確
            fullData.sort((a, b) => new Date(b.date) - new Date(a.date));
            render(fullData);
            
            document.getElementById('payForm').reset();
            initDateFilters(); // 重設日期為今天
            document.getElementById('item').focus();

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'ADD', 
                        item, 
                        amount, 
                        currency, 
                        twd: twdEstimate,
                        date: selectedDate // 傳送選定日期給 GAS
                    })
                });
                
                setTimeout(fetchData, 2000); 
            } catch (error) {
                console.error("提交失敗", error);
                alert("網絡異常，紀錄可能未同步到雲端");
                fetchData(); 
            }
        };

        // 抓取資料
        async function fetchData() {
            if (!SCRIPT_URL) {
                render(fullData); 
                return;
            }

            if (fullData.length === 0) document.body.classList.add('is-loading');

            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (Array.isArray(data)) {
                    fullData = data;
                    localStorage.setItem('travel_records_v3', JSON.stringify(fullData));
                    render(fullData);
                }
            } catch (e) { 
                console.error("讀取失敗", e);
            } finally { 
                document.body.classList.remove('is-loading'); 
            }
        }

        // 渲染列表與統計
        function render(items) {
            const listBody = document.getElementById('listBody');
            const totalCountEl = document.getElementById('totalCount');
            const totalAmountEl = document.getElementById('totalAmount');
            
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            
            // 轉化為時間戳進行比較
            const startTime = startVal ? new Date(startVal + 'T00:00:00').getTime() : 0;
            const endTime = endVal ? new Date(endVal + 'T23:59:59').getTime() : Infinity;

            // 日期範圍過濾
            let filteredItems = items.filter(i => {
                const recordTime = new Date(i.date).getTime();
                return recordTime >= startTime && recordTime <= endTime;
            });

            // 計算總計
            const totalSum = filteredItems.reduce((sum, i) => sum + (Number(i.twd) || 0), 0);
            totalCountEl.innerText = `共 ${filteredItems.length} 筆消費`;
            totalAmountEl.innerText = `NT$ ${totalSum.toLocaleString()}`;

            if (!filteredItems || filteredItems.length === 0) {
                listBody.innerHTML = '<tr><td class="p-20 text-center text-slate-300 font-medium italic">此範圍內沒有紀錄</td></tr>';
                return;
            }

            listBody.innerHTML = filteredItems.map(i => `
                <tr id="row-${i.id}" class="transition-all ${i.optimistic ? 'optimistic-item' : ''}">
                    <td class="px-6 py-5">
                        <div class="font-bold text-slate-800 text-base leading-tight">${i.item}</div>
                        <div class="text-[10px] text-slate-400 font-bold tracking-wider mt-1 flex items-center gap-2">
                            <span>${i.optimistic ? '儲存中...' : formatDate(i.date)}</span>
                            <span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-500">
                                原額: ${Number(i.amount).toLocaleString()} ${i.currency}
                            </span>
                        </div>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <div class="text-blue-600 font-black text-xl leading-none">
                            <span class="text-[10px] mr-0.5 font-bold">NT$</span>${Math.round(i.twd || 0).toLocaleString()}
                        </div>
                    </td>
                    <td class="px-4 py-5 text-right w-10">
                        ${i.optimistic ? 
                            `<div class="w-4 h-4 border-2 border-blue-100 border-t-blue-500 rounded-full animate-spin ml-auto"></div>` : 
                            `<button onclick="deleteItem('${i.id}')" class="text-slate-200 hover:text-red-400 transition-colors p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        // 刪除項目
        async function deleteItem(id) {
            if (!confirm('要刪除這筆紀錄嗎？')) return;
            
            const row = document.getElementById(`row-${id}`);
            if (row) row.classList.add('removing');

            setTimeout(async () => {
                fullData = fullData.filter(i => i.id !== id);
                localStorage.setItem('travel_records_v3', JSON.stringify(fullData));
                render(fullData);

                try {
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'DELETE', id: id }) 
                    });
                } catch(e) { 
                    fetchData(); 
                }
            }, 300);
        }

        // 日期格式化
        function formatDate(dStr) {
            const d = new Date(dStr);
            if (isNaN(d)) return dStr;
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        window.onload = () => { 
            initDateFilters();
            initRate(); 
            fetchData(); 
        };
    </script>
</body>
</html>
